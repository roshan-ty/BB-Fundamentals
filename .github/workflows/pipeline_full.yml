name: Full Data Pipeline (30-60 min cycle)

on:
  schedule:
    - cron: '*/30 * * * 1-5'
    - cron: '0 * * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  full-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest changes with rebase
        run: |
          git pull origin main --rebase --autostash || true

      - name: Run FRED Macro Data Pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python scripts/fetch_macro.py

      - name: Run CFTC Commitment of Traders Pipeline
        run: python scripts/fetch_cftc.py

      - name: Run Yahoo Finance Prices Pipeline
        run: python scripts/fetch_yfinance.py

      - name: Run Quantitative Analysis Engine
        run: python scripts/analysis_engine.py

      - name: Force-add all generated data files
        run: |
          git add --force data/*.json
          git add scripts/*.py .github/workflows/*.yml index.html style.css app.js
          git status

      - name: Commit and push changes
        run: |
          git config user.name "Bulls & Bears Fundamentals Bot"
          git config user.email "bot@bullsandbearsfundamentals.com"
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore(data): automated full pipeline update - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull origin main --rebase --autostash || true
            git push origin main
          )