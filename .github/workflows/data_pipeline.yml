name: High-Frequency Data Pipeline (5-15 min cycle)

on:
  schedule:
    - cron: '*/10 * * * 1-5'
    - cron: '*/15 * * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  high-frequency-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest changes with rebase
        run: |
          git pull origin main --rebase --autostash || true

      - name: Run Economic Calendar Pipeline
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/fetch_calendar.py

      - name: Run Live News Feed Pipeline
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Force-add updated JSON files
        run: |
          git add --force data/economic_calendar.json data/live_news.json
          git status

      - name: Commit and push changes
        run: |
          git config user.name "Bulls & Bears Fundamentals Bot"
          git config user.email "bot@bullsandbearsfundamentals.com"
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore(data): automated high-frequency pipeline update - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull origin main --rebase --autostash || true
            git push origin main
          )